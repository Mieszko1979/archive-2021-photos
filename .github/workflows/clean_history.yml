name: Auto Clean History (Monthly)

on:
  # 1. Запуск по расписанию: 1-го числа каждого месяца в 00:00 UTC
  schedule:
    - cron: '0 0 1 * *'
  
  # 2. Возможность запустить вручную в любой момент
  workflow_dispatch:

jobs:
  reset_history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Reset Git History
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Создаем временную ветку без истории
          git checkout --orphan temporary_branch
          
          # Добавляем все сжатые фото и JSON
          git add -A
          
          # Фиксируем текущее состояние
          git commit -m "Scheduled monthly cleanup: History cleared, only optimized files kept"
          
          # Переименовываем ветку в main и перезаписываем репозиторий
          git branch -D main
          git branch -m main
          git push -f origin main
